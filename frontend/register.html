<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Recruitment Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-background">
    <div class="auth-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join us and start your journey today</p>
    </div>

    <form class="auth-form" onsubmit="event.preventDefault(); register();">
      <div class="form-group">
        <input 
          type="text" 
          id="name" 
          placeholder="Full Name" 
          required
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <input 
          type="email" 
          id="email" 
          placeholder="Email address" 
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <input 
          type="password" 
          id="password" 
          placeholder="Password" 
          required
          autocomplete="new-password"
        >
      </div>

      <div class="role-selector">
        <label class="role-option">
          <input type="radio" name="role" value="candidate" checked>
          <span class="role-label">
            <span class="role-icon">👤</span>
            <span class="role-text">
              <strong>Candidate</strong>
              <small>Looking for opportunities</small>
            </span>
          </span>
        </label>
        
        <label class="role-option">
          <input type="radio" name="role" value="recruiter">
          <span class="role-label">
            <span class="role-icon">💼</span>
            <span class="role-text">
              <strong>Recruiter</strong>
              <small>Hiring talent</small>
            </span>
          </span>
        </label>
      </div>

      <button type="submit" class="auth-button">
        <span>Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Sign in here</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
